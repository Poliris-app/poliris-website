<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 720" role="img" aria-label="Analyzing progress bar with Cancel button, a Figma-style mock of the onboarding flow in the background, and a Discover all our AI Agents card with a See all the AI Agents link and a Got it button.">
  <defs>
    <filter id="qs6-shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="2" stdDeviation="6" flood-color="#0F172A" flood-opacity="0.06"/>
    </filter>
    <style>
      .qs6-bg { fill: #FFFFFF; stroke: #E5E7EB; stroke-width: 1; }
      .qs6-analyzing-bg { fill: #FFFFFF; stroke: #E5E7EB; stroke-width: 1; }
      .qs6-an-title { font: 600 16px "Geist", "Inter", system-ui, sans-serif; fill: #0A0A0A; }
      .qs6-cancel-bg { fill: #FFFFFF; stroke: #E5E7EB; stroke-width: 1; }
      .qs6-cancel-tx { font: 600 13px "Geist", "Inter", system-ui, sans-serif; fill: #0A0A0A; }
      .qs6-board-bg { fill: #BCC2CE; }
      .qs6-figma-chrome { fill: #F1F5F9; stroke: #E5E7EB; stroke-width: 1; }
      .qs6-figma-side { fill: #E5E7EB; }
      .qs6-h2 { font: 700 22px "Geist", "Inter", system-ui, sans-serif; fill: #0A0A0A; }
      .qs6-p { font: 400 13px "Geist", "Inter", system-ui, sans-serif; fill: #475569; }
      .qs6-link { font: 600 13px "Geist", "Inter", system-ui, sans-serif; fill: #0A0A0A; text-decoration: underline; }
      .qs6-primary-bg { fill: #0062FF; }
      .qs6-primary-tx { font: 600 13px "Geist", "Inter", system-ui, sans-serif; fill: #FFFFFF; }
    </style>
  </defs>

  <rect class="qs6-bg" x="1" y="1" width="798" height="718" rx="14" ry="14" filter="url(#qs6-shadow)"/>

  <!-- Analyzing top bar -->
  <rect class="qs6-analyzing-bg" x="24" y="24" width="752" height="72" rx="12"/>
  <!-- Spinner -->
  <g transform="translate(60 60)">
    <circle r="14" fill="none" stroke="#E5E7EB" stroke-width="3"/>
    <path d="M0 -14 A14 14 0 0 1 12 -6" stroke="#0062FF" stroke-width="3" fill="none" stroke-linecap="round"/>
  </g>
  <text class="qs6-an-title" x="90" y="65">Analyzing</text>
  <rect class="qs6-cancel-bg" x="680" y="44" width="72" height="32" rx="16"/>
  <text class="qs6-cancel-tx" x="716" y="64" text-anchor="middle">Cancel</text>
  <!-- Progress bar -->
  <rect x="52" y="82" width="580" height="6" rx="3" fill="#E5E7EB"/>
  <rect x="52" y="82" width="300" height="6" rx="3" fill="#0062FF"/>

  <!-- Figma-style board -->
  <rect class="qs6-board-bg" x="24" y="112" width="752" height="360" rx="10"/>
  <!-- Figma top tabs -->
  <rect x="24" y="112" width="752" height="22" fill="#E5E7EB" rx="10"/>
  <rect x="32" y="116" width="60" height="14" rx="3" fill="#FFFFFF"/>
  <text x="62" y="126" font-family="Geist, system-ui" font-size="9" fill="#0A0A0A" text-anchor="middle">Poliris App</text>
  <rect x="96" y="116" width="120" height="14" rx="3" fill="#CBD5E1"/>
  <text x="156" y="126" font-family="Geist, system-ui" font-size="8" fill="#475569" text-anchor="middle">Anecdroal for Figma - Flo Books</text>
  <rect x="220" y="116" width="70" height="14" rx="3" fill="#CBD5E1"/>
  <text x="255" y="126" font-family="Geist, system-ui" font-size="8" fill="#475569" text-anchor="middle">Colorless App</text>

  <!-- Left sidebar of Figma -->
  <rect x="24" y="134" width="130" height="338" fill="#E2E4E9" rx="2"/>
  <text x="36" y="152" font-family="Geist, system-ui" font-size="9" font-weight="700" fill="#0A0A0A">Poliris App</text>
  <text x="36" y="164" font-family="Geist, system-ui" font-size="7" fill="#64748B">Drafts</text>
  <text x="36" y="180" font-family="Geist, system-ui" font-size="8" fill="#0A0A0A">File</text>
  <text x="36" y="192" font-family="Geist, system-ui" font-size="8" fill="#0A0A0A">Pages</text>
  <text x="36" y="204" font-family="Geist, system-ui" font-size="8" fill="#0A0A0A">Assets</text>
  <text x="36" y="216" font-family="Geist, system-ui" font-size="8" fill="#0A0A0A">Workflow</text>
  <text x="36" y="228" font-family="Geist, system-ui" font-size="8" fill="#0A0A0A">Design system</text>
  <text x="36" y="240" font-family="Geist, system-ui" font-size="8" fill="#0A0A0A">Archive</text>
  <text x="36" y="254" font-family="Geist, system-ui" font-size="7" fill="#64748B">Layers</text>
  <text x="36" y="270" font-family="Geist, system-ui" font-size="8" fill="#0A0A0A">Step 3.0</text>
  <g font-family="Geist, system-ui" font-size="7" fill="#475569">
    <text x="44" y="284">Sources</text>
    <text x="54" y="294">SubContent</text>
    <text x="54" y="304">Analyzing</text>
    <text x="62" y="314">Spin / Analyzing</text>
    <text x="62" y="324">Cursor</text>
    <text x="62" y="334">Canvas</text>
    <text x="62" y="344">Cancel</text>
  </g>

  <!-- Right sidebar of Figma -->
  <rect x="660" y="134" width="116" height="338" fill="#E2E4E9" rx="2"/>
  <circle cx="672" cy="148" r="5" fill="#CBD5E1"/>
  <text x="684" y="151" font-family="Geist, system-ui" font-size="8" fill="#0A0A0A">Design</text>
  <text x="670" y="168" font-family="Geist, system-ui" font-size="8" fill="#0A0A0A">Page</text>
  <rect x="670" y="176" width="96" height="14" fill="#D1D5DB" rx="2"/>
  <text x="670" y="204" font-family="Geist, system-ui" font-size="7" fill="#64748B">Variables</text>
  <text x="670" y="218" font-family="Geist, system-ui" font-size="7" fill="#64748B">Styles</text>
  <text x="670" y="236" font-family="Geist, system-ui" font-size="7" fill="#64748B">Text styles</text>
  <g font-family="Geist, system-ui" font-size="6" fill="#475569">
    <text x="674" y="250">text sm</text>
    <text x="674" y="260">text lg</text>
    <text x="674" y="270">text xl</text>
    <text x="674" y="280">text XL</text>
    <text x="674" y="290">text 2xl</text>
    <text x="674" y="300">text 3xl</text>
    <text x="674" y="310">text 4xl</text>
    <text x="674" y="320">text 5xl</text>
  </g>

  <!-- Canvas mockup frames -->
  <g transform="translate(170 150)">
    <!-- frame row 1 -->
    <rect x="0" y="0" width="70" height="92" fill="#FFFFFF" stroke="#94A3B8" stroke-width="0.6"/>
    <rect x="6" y="6" width="58" height="4" fill="#E5E7EB"/>
    <rect x="6" y="14" width="40" height="3" fill="#CBD5E1"/>

    <rect x="78" y="0" width="70" height="92" fill="#FFFFFF" stroke="#94A3B8" stroke-width="0.6"/>
    <rect x="84" y="6" width="58" height="4" fill="#E5E7EB"/>

    <rect x="156" y="0" width="70" height="92" fill="#FFFFFF" stroke="#94A3B8" stroke-width="0.6"/>
    <rect x="162" y="6" width="58" height="4" fill="#E5E7EB"/>

    <rect x="234" y="0" width="70" height="92" fill="#FFFFFF" stroke="#94A3B8" stroke-width="0.6"/>
    <rect x="240" y="6" width="58" height="4" fill="#E5E7EB"/>

    <rect x="312" y="0" width="70" height="92" fill="#FFFFFF" stroke="#94A3B8" stroke-width="0.6"/>
    <rect x="318" y="6" width="58" height="4" fill="#E5E7EB"/>

    <!-- frame row 2 -->
    <rect x="0" y="100" width="70" height="110" fill="#FFFFFF" stroke="#94A3B8" stroke-width="0.6"/>
    <rect x="6" y="108" width="58" height="20" fill="#E5E7EB"/>
    <rect x="78" y="100" width="146" height="110" fill="#FFFFFF" stroke="#94A3B8" stroke-width="0.6"/>
    <rect x="84" y="108" width="134" height="32" fill="#E5E7EB"/>
    <rect x="234" y="100" width="70" height="110" fill="#FFFFFF" stroke="#94A3B8" stroke-width="0.6"/>
    <rect x="234" y="150" width="70" height="60" fill="#FFFFFF" stroke="#94A3B8" stroke-width="0.6"/>
    <rect x="312" y="100" width="70" height="60" fill="#FFFFFF" stroke="#94A3B8" stroke-width="0.6"/>

    <!-- frame row 3 -->
    <rect x="78" y="218" width="146" height="90" fill="#FFFFFF" stroke="#94A3B8" stroke-width="0.6"/>
    <rect x="84" y="226" width="134" height="24" fill="#E5E7EB"/>
  </g>

  <!-- Cursor pointer on canvas -->
  <g transform="translate(398 290)">
    <path d="M0 0 L10 14 L6 14 L8 20 L6 20 L4 14 L0 14 Z" fill="#FACC15" stroke="#0A0A0A" stroke-width="0.6"/>
  </g>

  <!-- Discover card section -->
  <line x1="24" y1="504" x2="776" y2="504" stroke="#E5E7EB"/>
  <text class="qs6-h2" x="28" y="540">Discover all our AI Agents</text>
  <text class="qs6-p" x="28" y="568">Lorem ipsum dolor sit amet, consectetur adipiscing elit. Ut et massa mi. Aliquam in hendrerit urna. Pellentesque</text>
  <text class="qs6-p" x="28" y="586">sit amet sapien fringilla, mattis ligula consectetur, ultrices mauris.</text>

  <text class="qs6-link" x="28" y="652">See all the AI Agents</text>
  <rect class="qs6-primary-bg" x="684" y="630" width="80" height="38" rx="10"/>
  <text class="qs6-primary-tx" x="724" y="654" text-anchor="middle">Got it</text>
</svg>
