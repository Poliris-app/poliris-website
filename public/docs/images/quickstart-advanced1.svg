<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 820" role="img" aria-label="Onboarding Step 4 of 5 with a two-column layout: the left column recaps the detected brand Gleamer with a Radiology AI product dropdown and a help card, and the right column shows Advanced settings with a Poli AI info banner, six LLM cards (Claude Sonnet 4 selected), four Axes cards (all selected), trading zone United States, language English, plus Back and Next buttons.">
  <defs>
    <filter id="qs4-shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="2" stdDeviation="6" flood-color="#0F172A" flood-opacity="0.06"/>
    </filter>
    <style>
      .qs4-bg { fill: #FFFFFF; stroke: #E5E7EB; stroke-width: 1; }
      .qs4-logo { font: 800 22px "Geist", "Inter", system-ui, sans-serif; fill: #0A0A0A; }
      .qs4-step { font: 500 12px "Geist", "Inter", system-ui, sans-serif; fill: #0A0A0A; }
      .qs4-h2 { font: 700 22px "Geist", "Inter", system-ui, sans-serif; fill: #0A0A0A; }
      .qs4-sub { font: 400 13px "Geist", "Inter", system-ui, sans-serif; fill: #64748B; }
      .qs4-label { font: 600 13px "Geist", "Inter", system-ui, sans-serif; fill: #0A0A0A; }
      .qs4-hint { font: 400 12px "Geist", "Inter", system-ui, sans-serif; fill: #64748B; }
      .qs4-card-bg { fill: #FFFFFF; stroke: #E5E7EB; stroke-width: 1; }
      .qs4-brand-tx { font: 600 14px "Geist", "Inter", system-ui, sans-serif; fill: #0A0A0A; }
      .qs4-dd-bg { fill: #FFFFFF; stroke: #E5E7EB; stroke-width: 1; }
      .qs4-dd-tx { font: 400 13px "Geist", "Inter", system-ui, sans-serif; fill: #0A0A0A; }
      .qs4-help-bg { fill: #F8FAFC; stroke: #E5E7EB; stroke-width: 1; }
      .qs4-help-title { font: 600 13px "Geist", "Inter", system-ui, sans-serif; fill: #0A0A0A; }
      .qs4-help-sub { font: 400 11px "Geist", "Inter", system-ui, sans-serif; fill: #64748B; }
      .qs4-ask-bg { fill: #EAF2FF; stroke: #C7DEFF; stroke-width: 1; }
      .qs4-ask-title { font: 600 13px "Geist", "Inter", system-ui, sans-serif; fill: #0A0A0A; }
      .qs4-ask-body { font: 400 11px "Geist", "Inter", system-ui, sans-serif; fill: #475569; }
      .qs4-try-bg { fill: #1E3A8A; }
      .qs4-try-tx { font: 600 12px "Geist", "Inter", system-ui, sans-serif; fill: #FFFFFF; }
      .qs4-model-title { font: 600 13px "Geist", "Inter", system-ui, sans-serif; fill: #0A0A0A; }
      .qs4-model-sub { font: 400 11px "Geist", "Inter", system-ui, sans-serif; fill: #64748B; }
      .qs4-model-bg { fill: #FFFFFF; stroke: #E5E7EB; stroke-width: 1; }
      .qs4-model-sel-bg { fill: #EAF2FF; stroke: #0062FF; stroke-width: 1; }
      .qs4-axis-title { font: 600 13px "Geist", "Inter", system-ui, sans-serif; fill: #0A0A0A; }
      .qs4-axis-sub { font: 400 11px "Geist", "Inter", system-ui, sans-serif; fill: #64748B; }
      .qs4-axis-bg { fill: #FFFFFF; stroke: #0062FF; stroke-width: 1; }
      .qs4-more { font: 500 12px "Geist", "Inter", system-ui, sans-serif; fill: #0062FF; }
      .qs4-back-bg { fill: #F1F5F9; stroke: #E5E7EB; stroke-width: 1; }
      .qs4-back-tx { font: 600 13px "Geist", "Inter", system-ui, sans-serif; fill: #475569; }
      .qs4-primary-bg { fill: #0062FF; }
      .qs4-primary-tx { font: 600 13px "Geist", "Inter", system-ui, sans-serif; fill: #FFFFFF; }
    </style>
  </defs>

  <rect class="qs4-bg" x="1" y="1" width="1198" height="818" rx="14" ry="14" filter="url(#qs4-shadow)"/>

  <!-- Vertical divider -->
  <line x1="500" y1="40" x2="500" y2="780" stroke="#E5E7EB"/>

  <!-- =========== LEFT COLUMN =========== -->
  <text class="qs4-logo" x="36" y="52"><tspan fill="#1E3A8A">P</tspan>oli<tspan fill="#0062FF">&#9711;</tspan>ris</text>
  <text class="qs4-step" x="36" y="80">Step 4 of 5</text>
  <line x1="36" y1="90" x2="118" y2="90" stroke="#0062FF" stroke-width="2"/>
  <line x1="126" y1="90" x2="208" y2="90" stroke="#0062FF" stroke-width="2"/>
  <line x1="216" y1="90" x2="298" y2="90" stroke="#0062FF" stroke-width="2"/>
  <line x1="306" y1="90" x2="388" y2="90" stroke="#0062FF" stroke-width="2"/>
  <line x1="396" y1="90" x2="464" y2="90" stroke="#E5E7EB" stroke-width="2"/>

  <text class="qs4-h2" x="36" y="148">We found your product</text>
  <text class="qs4-sub" x="36" y="170">Choose your product and start your analysis.</text>

  <!-- Gleamer card -->
  <rect class="qs4-card-bg" x="36" y="200" width="432" height="52" rx="10"/>
  <circle cx="60" cy="226" r="13" fill="#0A0A0A"/>
  <circle cx="60" cy="226" r="5" fill="#FFFFFF"/>
  <text class="qs4-brand-tx" x="88" y="231">Gleamer</text>

  <!-- Chose your product label -->
  <text class="qs4-label" x="36" y="284">Chose your product:</text>
  <rect class="qs4-dd-bg" x="36" y="296" width="432" height="44" rx="10"/>
  <text class="qs4-dd-tx" x="52" y="323">Radiology AI</text>
  <path d="M444 314 L456 314 L450 324 Z" fill="#94A3B8"/>

  <!-- Help card (bottom of left column) -->
  <rect class="qs4-help-bg" x="36" y="628" width="432" height="120" rx="12"/>
  <text class="qs4-help-title" x="52" y="660">You need help ?</text>
  <text class="qs4-help-sub" x="52" y="680">Book a call with the team to give you the insight of the app</text>
  <!-- avatars -->
  <circle cx="68" cy="716" r="12" fill="#CBD5E1" stroke="#FFFFFF" stroke-width="2"/>
  <circle cx="86" cy="716" r="12" fill="#94A3B8" stroke="#FFFFFF" stroke-width="2"/>
  <circle cx="104" cy="716" r="12" fill="#FACC15" stroke="#FFFFFF" stroke-width="2"/>
  <text x="104" y="720" text-anchor="middle" font-family="Geist, system-ui" font-size="10" font-weight="700" fill="#0A0A0A">Y</text>
  <!-- Book a call button -->
  <rect x="282" y="700" width="174" height="36" rx="10" fill="#0062FF"/>
  <text x="369" y="723" text-anchor="middle" font-family="Geist, system-ui" font-size="12" font-weight="600" fill="#FFFFFF">Book a call &#8599;</text>

  <!-- =========== RIGHT COLUMN =========== -->
  <text class="qs4-h2" x="536" y="52">Advanced settings</text>
  <text class="qs4-sub" x="536" y="74">Choose your product and start your analysis.</text>

  <!-- Ask Poli AI banner -->
  <rect class="qs4-ask-bg" x="536" y="96" width="628" height="92" rx="12"/>
  <text x="552" y="122" font-family="Geist, system-ui" font-size="14" font-weight="700" fill="#0062FF">&#9993;</text>
  <text class="qs4-ask-title" x="576" y="122">Ask Poli AI, if you need help, just ask!</text>
  <text class="qs4-ask-body" x="552" y="144">Lorem ipsum dolor sit amet, consectetur adipiscing elit. Ut et massa mi. Aliquam in hendrerit</text>
  <text class="qs4-ask-body" x="552" y="160">urna. Pellentesque sit amet sapien fringilla.</text>
  <rect class="qs4-try-bg" x="1080" y="148" width="72" height="30" rx="15"/>
  <text class="qs4-try-tx" x="1116" y="168" text-anchor="middle">Try poly</text>

  <!-- LLM section -->
  <text class="qs4-label" x="536" y="222">LLM:</text>
  <text class="qs4-hint" x="536" y="240">Chose LLM you want to track</text>

  <!-- 6 model cards (3 per row, 2 rows) -->
  <g transform="translate(536 258)">
    <!-- ChatGPT -->
    <rect class="qs4-model-bg" x="0" y="0" width="200" height="72" rx="10"/>
    <circle cx="100" cy="26" r="10" fill="#10A37F"/>
    <text class="qs4-model-title" x="100" y="52" text-anchor="middle">ChatGPT</text>
    <text class="qs4-model-sub" x="100" y="66" text-anchor="middle">GPT-4o</text>

    <!-- Claude (selected) -->
    <g transform="translate(214 0)">
      <rect class="qs4-model-sel-bg" x="0" y="0" width="200" height="72" rx="10"/>
      <g transform="translate(92 16)">
        <path d="M8 0 L12 8 L20 8 L14 12 L17 20 L10 16 L3 20 L6 12 L0 8 L8 8 Z" fill="#D97757"/>
      </g>
      <text class="qs4-model-title" x="100" y="52" text-anchor="middle">Claude</text>
      <text class="qs4-model-sub" x="100" y="66" text-anchor="middle">Sonnet 4</text>
    </g>

    <!-- Perplexity -->
    <g transform="translate(428 0)">
      <rect class="qs4-model-bg" x="0" y="0" width="200" height="72" rx="10"/>
      <g transform="translate(92 16)">
        <path d="M10 0 L20 10 L10 20 L0 10 Z" fill="none" stroke="#1F8181" stroke-width="2"/>
      </g>
      <text class="qs4-model-title" x="100" y="52" text-anchor="middle">Perplexity</text>
      <text class="qs4-model-sub" x="100" y="66" text-anchor="middle">Sonar</text>
    </g>
  </g>

  <g transform="translate(536 342)">
    <!-- LLaMA -->
    <rect class="qs4-model-bg" x="0" y="0" width="200" height="72" rx="10"/>
    <g transform="translate(93 14)">
      <path d="M0 14 Q7 0 14 14 Q7 6 0 14 Z" fill="#0866FF"/>
    </g>
    <text class="qs4-model-title" x="100" y="52" text-anchor="middle">LLaMA</text>
    <text class="qs4-model-sub" x="100" y="66" text-anchor="middle">LLaMA 4</text>

    <!-- Mistral -->
    <g transform="translate(214 0)">
      <rect class="qs4-model-bg" x="0" y="0" width="200" height="72" rx="10"/>
      <g transform="translate(88 12)">
        <rect x="0" y="0" width="5" height="20" fill="#FFBB00"/>
        <rect x="6" y="0" width="5" height="20" fill="#FF8205"/>
        <rect x="12" y="0" width="5" height="20" fill="#FC4B05"/>
        <rect x="18" y="0" width="5" height="20" fill="#E10500"/>
      </g>
      <text class="qs4-model-title" x="100" y="52" text-anchor="middle">Mistral</text>
      <text class="qs4-model-sub" x="100" y="66" text-anchor="middle">Large</text>
    </g>

    <!-- Gemini -->
    <g transform="translate(428 0)">
      <rect class="qs4-model-bg" x="0" y="0" width="200" height="72" rx="10"/>
      <g transform="translate(92 14)">
        <path d="M10 0 L13 7 L20 10 L13 13 L10 20 L7 13 L0 10 L7 7 Z" fill="#4285F4"/>
      </g>
      <text class="qs4-model-title" x="100" y="52" text-anchor="middle">Gemini</text>
      <text class="qs4-model-sub" x="100" y="66" text-anchor="middle">Gemini 2.0</text>
    </g>
  </g>

  <!-- Axes section -->
  <text class="qs4-label" x="536" y="446">Axes</text>
  <text class="qs4-hint" x="536" y="464">We track your visibility through different axis, see below the most relevant for you.</text>

  <!-- 4 axis cards (2x2) -->
  <g transform="translate(536 482)">
    <!-- Customer Experience -->
    <rect class="qs4-axis-bg" x="0" y="0" width="306" height="52" rx="10"/>
    <circle cx="20" cy="26" r="9" fill="#0062FF"/>
    <path d="M17 26 L19 28 L23 24" stroke="#FFFFFF" stroke-width="1.8" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    <text class="qs4-axis-title" x="40" y="24">Customer Experience</text>
    <text class="qs4-axis-sub" x="40" y="40">How the brand delivers on the human and usability side</text>

    <!-- Value & Pricing -->
    <g transform="translate(322 0)">
      <rect class="qs4-axis-bg" x="0" y="0" width="306" height="52" rx="10"/>
      <circle cx="20" cy="26" r="9" fill="#0062FF"/>
      <path d="M17 26 L19 28 L23 24" stroke="#FFFFFF" stroke-width="1.8" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
      <text class="qs4-axis-title" x="40" y="24">Value &amp; Pricing</text>
      <text class="qs4-axis-sub" x="40" y="40">How the brand is positioned on the price-value spectrum</text>
    </g>
  </g>

  <g transform="translate(536 544)">
    <!-- Quality & Performance -->
    <rect class="qs4-axis-bg" x="0" y="0" width="306" height="52" rx="10"/>
    <circle cx="20" cy="26" r="9" fill="#0062FF"/>
    <path d="M17 26 L19 28 L23 24" stroke="#FFFFFF" stroke-width="1.8" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    <text class="qs4-axis-title" x="40" y="24">Quality &amp; Performance</text>
    <text class="qs4-axis-sub" x="40" y="40">Core product/service excellence dimensions</text>

    <!-- Innovation & Technology -->
    <g transform="translate(322 0)">
      <rect class="qs4-axis-bg" x="0" y="0" width="306" height="52" rx="10"/>
      <circle cx="20" cy="26" r="9" fill="#0062FF"/>
      <path d="M17 26 L19 28 L23 24" stroke="#FFFFFF" stroke-width="1.8" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
      <text class="qs4-axis-title" x="40" y="24">Innovation &amp; Technology</text>
      <text class="qs4-axis-sub" x="40" y="40">Foward-thinking, technological edge and integration capabilities</text>
    </g>
  </g>

  <text class="qs4-more" x="536" y="620">+ More axes</text>

  <!-- Add trading zone + Language -->
  <text class="qs4-label" x="536" y="660">Add trading zone:</text>
  <rect class="qs4-dd-bg" x="536" y="670" width="306" height="44" rx="10"/>
  <!-- US flag simplified -->
  <rect x="554" y="684" width="20" height="16" fill="#BE1A2D"/>
  <rect x="554" y="684" width="20" height="3" fill="#FFFFFF"/>
  <rect x="554" y="690" width="20" height="3" fill="#FFFFFF"/>
  <rect x="554" y="696" width="20" height="3" fill="#FFFFFF"/>
  <rect x="554" y="684" width="10" height="8" fill="#102866"/>
  <text class="qs4-dd-tx" x="586" y="697">United State</text>
  <path d="M820 690 L832 690 L826 698 Z" fill="#94A3B8"/>

  <text class="qs4-label" x="858" y="660">Language:</text>
  <rect class="qs4-dd-bg" x="858" y="670" width="306" height="44" rx="10"/>
  <text class="qs4-dd-tx" x="874" y="697">English</text>
  <path d="M1142 690 L1154 690 L1148 698 Z" fill="#94A3B8"/>

  <!-- Back + Next -->
  <rect class="qs4-back-bg" x="536" y="736" width="308" height="44" rx="10"/>
  <text class="qs4-back-tx" x="690" y="764" text-anchor="middle">Back</text>
  <rect class="qs4-primary-bg" x="856" y="736" width="308" height="44" rx="10"/>
  <text class="qs4-primary-tx" x="1010" y="764" text-anchor="middle">Next</text>
</svg>
