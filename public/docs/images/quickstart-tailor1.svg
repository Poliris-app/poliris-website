  </g>
  <g transform="translate(28 408)"><rect class="qs2-chip-bg" x="0" y="0" width="130" height="28" rx="6"/><text class="qs2-chip-tx" x="65" y="18" text-anchor="middle">Follow competitors</text></g>

  <!-- How you now us -->
  <text class="qs2-label" x="28" y="472">How you now us:</text>
  <g transform="translate(28 484)">
    <g>
      <rect class="qs2-chip-sel-bg" x="0" y="0" width="148" height="28" rx="6"/>
      <circle cx="12" cy="14" r="7" fill="#0062FF"/>
      <path d="M9 14 L11 16 L15 12" stroke="#FFFFFF" stroke-width="1.6" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
      <text class="qs2-chip-sel-tx" x="84" y="18" text-anchor="middle">Monitor sentiment</text>
    </g>
    <g transform="translate(158 0)"><rect class="qs2-chip-bg" x="0" y="0" width="146" height="28" rx="6"/><text class="qs2-chip-tx" x="73" y="18" text-anchor="middle">Track brand visibility</text></g>
    <g transform="translate(314 0)"><rect class="qs2-chip-bg" x="0" y="0" width="130" height="28" rx="6"/><text class="qs2-chip-tx" x="65" y="18" text-anchor="middle">Compare products</text></g>
  </g>
  <g transform="translate(28 520)"><rect class="qs2-chip-bg" x="0" y="0" width="130" height="28" rx="6"/><text class="qs2-chip-tx" x="65" y="18" text-anchor="middle">Follow competitors</text></g>

  <!-- Back + Next -->
