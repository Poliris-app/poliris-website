<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 560 660" role="img" aria-label="Onboarding Step 2 of 5 titled Help us tailor your experience, with chip selectors for Company size (51-200 selected), Role (Brand/Communications selected), Main goal (Monitor sentiment selected), and How you now us (Monitor sentiment selected), plus Back and Next buttons.">
  <defs>
    <filter id="qs2-shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="2" stdDeviation="6" flood-color="#0F172A" flood-opacity="0.06"/>
    </filter>
    <style>
      .qs2-bg { fill: #FFFFFF; stroke: #E5E7EB; stroke-width: 1; }
      .qs2-logo { font: 800 22px "Geist", "Inter", system-ui, sans-serif; fill: #0A0A0A; }
      .qs2-step { font: 500 12px "Geist", "Inter", system-ui, sans-serif; fill: #0A0A0A; }
      .qs2-h2 { font: 700 22px "Geist", "Inter", system-ui, sans-serif; fill: #0A0A0A; }
      .qs2-label { font: 600 13px "Geist", "Inter", system-ui, sans-serif; fill: #0A0A0A; }
      .qs2-chip-bg { fill: #FFFFFF; stroke: #E5E7EB; stroke-width: 1; }
      .qs2-chip-tx { font: 500 12px "Geist", "Inter", system-ui, sans-serif; fill: #0A0A0A; }
      .qs2-chip-sel-bg { fill: #E5F0FF; stroke: #0062FF; stroke-width: 1; }
      .qs2-chip-sel-tx { font: 600 12px "Geist", "Inter", system-ui, sans-serif; fill: #0A0A0A; }
      .qs2-primary-bg { fill: #0062FF; }
      .qs2-primary-tx { font: 600 13px "Geist", "Inter", system-ui, sans-serif; fill: #FFFFFF; }
      .qs2-back-bg { fill: #F1F5F9; stroke: #E5E7EB; stroke-width: 1; }
      .qs2-back-tx { font: 600 13px "Geist", "Inter", system-ui, sans-serif; fill: #475569; }
    </style>
  </defs>

  <rect class="qs2-bg" x="1" y="1" width="558" height="658" rx="14" ry="14" filter="url(#qs2-shadow)"/>

  <!-- Logo + step -->
  <text class="qs2-logo" x="28" y="46"><tspan fill="#1E3A8A">P</tspan>oli<tspan fill="#0062FF">&#9711;</tspan>ris</text>
  <text class="qs2-step" x="28" y="74">Step 2 of 5</text>
  <line x1="28" y1="84" x2="132" y2="84" stroke="#0062FF" stroke-width="2"/>
  <line x1="140" y1="84" x2="244" y2="84" stroke="#0062FF" stroke-width="2"/>
  <line x1="252" y1="84" x2="356" y2="84" stroke="#E5E7EB" stroke-width="2"/>
  <line x1="364" y1="84" x2="468" y2="84" stroke="#E5E7EB" stroke-width="2"/>
  <line x1="476" y1="84" x2="532" y2="84" stroke="#E5E7EB" stroke-width="2"/>

  <!-- H2 -->
  <text class="qs2-h2" x="28" y="130">Help us tailor your experience</text>

