<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 220" role="img" aria-label="Top sentiment metrics row: Overall Sentiment 86/100 Excellent, Web Analysis 71/100 Good, Brand Perception 100/100 Excellent, and Sentiment Distribution 12 Positive 1 Mixed.">
  <defs>
    <filter id="tm-shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="2" stdDeviation="6" flood-color="#0F172A" flood-opacity="0.06"/>
    </filter>
    <style>
      .tm-bg { fill: #FFFFFF; stroke: #E5E7EB; stroke-width: 1; }
      .tm-title { font: 600 14px "Geist", "Inter", system-ui, sans-serif; fill: #0A0A0A; }
      .tm-sub { font: 400 11px "Geist", "Inter", system-ui, sans-serif; fill: #64748B; }
      .tm-exc-bg { fill: #DCFCE7; }
      .tm-exc-tx { font: 500 11px "Geist", "Inter", system-ui, sans-serif; fill: #15803D; }
      .tm-good-bg { fill: #DCFCE7; }
      .tm-good-tx { font: 500 11px "Geist", "Inter", system-ui, sans-serif; fill: #15803D; }
      .tm-pos-bg { fill: #DCFCE7; }
      .tm-pos-tx { font: 500 11px "Geist", "Inter", system-ui, sans-serif; fill: #15803D; }
      .tm-num { font: 700 24px "Geist", "Inter", system-ui, sans-serif; fill: #0A0A0A; }
      .tm-num-sm { font: 500 11px "Geist", "Inter", system-ui, sans-serif; fill: #64748B; }
      .tm-big-count { font: 700 28px "Geist", "Inter", system-ui, sans-serif; fill: #0A0A0A; }
      .tm-count-label { font: 500 11px "Geist", "Inter", system-ui, sans-serif; fill: #64748B; }
      .tm-kv-label { font: 600 14px "Geist", "Inter", system-ui, sans-serif; fill: #0A0A0A; }
      .tm-legend { font: 500 11px "Geist", "Inter", system-ui, sans-serif; fill: #475569; }
    </style>
  </defs>

  <!-- Card 1: Overall Sentiment -->
  <rect class="tm-bg" x="1" y="1" width="420" height="218" rx="14" ry="14" filter="url(#tm-shadow)"/>
  <text class="tm-title" x="20" y="30">Overall Sentiment</text>
  <text class="tm-sub" x="20" y="48">Quick read of what lifts or limits sentiments</text>
  <rect class="tm-exc-bg" x="228" y="16" width="60" height="20" rx="10" ry="10"/>
  <text class="tm-exc-tx" x="258" y="30" text-anchor="middle">Excellent</text>

  <!-- Sparkline trend (upward) -->
  <polyline points="20,170 60,160 100,152 140,138 180,122 220,108 250,98" fill="none" stroke="#0062FF" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
  <circle cx="250" cy="98" r="5" fill="#22C55E" stroke="#FFFFFF" stroke-width="2"/>

  <!-- Donut gauge 86/100 (86% arc) -->
  <!-- circumference = 2*pi*34 = 213.63 ; 86% = 183.72 -->
  <circle cx="360" cy="140" r="34" fill="none" stroke="#DBEAFE" stroke-width="8"/>
  <circle cx="360" cy="140" r="34" fill="none" stroke="#0062FF" stroke-width="8"
          stroke-dasharray="183.72 29.91" stroke-dashoffset="53.41"
          transform="rotate(-90 360 140)" stroke-linecap="round"/>
  <text class="tm-num" x="360" y="144" text-anchor="middle">86</text>
  <text class="tm-num-sm" x="360" y="158" text-anchor="middle">/100</text>

  <!-- Card 2: Web Analysis + Brand Perception -->
  <rect class="tm-bg" x="440" y="1" width="400" height="218" rx="14" ry="14" filter="url(#tm-shadow)"/>
  <!-- Web Analysis row -->
  <text class="tm-title" x="460" y="30">Web Analysis</text>
  <rect class="tm-good-bg" x="782" y="16" width="40" height="20" rx="10" ry="10"/>
  <text class="tm-good-tx" x="802" y="30" text-anchor="middle">Good</text>
  <text class="tm-big-count" x="460" y="80">71</text>
  <text class="tm-num-sm" x="506" y="80">/100</text>
  <rect x="560" y="66" width="260" height="14" rx="7" fill="#E2E8F0"/>
  <rect x="560" y="66" width="184" height="14" rx="7" fill="#0062FF"/>

  <!-- Brand Perception row -->
  <text class="tm-title" x="460" y="126">Brand Perception</text>
  <rect class="tm-exc-bg" x="762" y="112" width="60" height="20" rx="10" ry="10"/>
  <text class="tm-exc-tx" x="792" y="126" text-anchor="middle">Excellent</text>
  <text class="tm-big-count" x="460" y="176">100</text>
  <text class="tm-num-sm" x="520" y="176">/100</text>
  <rect x="560" y="162" width="260" height="14" rx="7" fill="#E2E8F0"/>
  <rect x="560" y="162" width="260" height="14" rx="7" fill="#1E293B"/>

  <!-- Card 3: Sentiment Distribution -->
  <rect class="tm-bg" x="860" y="1" width="340" height="218" rx="14" ry="14" filter="url(#tm-shadow)"/>
  <text class="tm-title" x="878" y="30">Sentiment Distribution</text>
  <rect class="tm-pos-bg" x="1136" y="16" width="50" height="20" rx="10" ry="10"/>
  <text class="tm-pos-tx" x="1161" y="30" text-anchor="middle">Positive</text>

  <!-- 4 counts -->
  <text class="tm-big-count" x="910" y="94" text-anchor="middle">12</text>
  <text class="tm-count-label" x="910" y="116" text-anchor="middle">Positive</text>

  <text class="tm-big-count" x="990" y="94" text-anchor="middle">1</text>
  <text class="tm-count-label" x="990" y="116" text-anchor="middle">Mixed</text>

  <text class="tm-big-count" x="1070" y="94" text-anchor="middle">0</text>
  <text class="tm-count-label" x="1070" y="116" text-anchor="middle">Negative</text>

  <text class="tm-big-count" x="1150" y="94" text-anchor="middle">0</text>
  <text class="tm-count-label" x="1150" y="116" text-anchor="middle">Not mentioned</text>

  <!-- Segmented bar 92% blue, 8% orange -->
  <rect x="878" y="148" width="304" height="12" rx="6" fill="#0062FF"/>
  <rect x="1162" y="148" width="20" height="12" rx="0" fill="#F59E0B"/>
  <rect x="1178" y="148" width="4" height="12" rx="0" fill="#F59E0B"/>

  <!-- Legend -->
  <circle cx="884" cy="188" r="4" fill="#0062FF"/>
  <text class="tm-legend" x="894" y="192">92% Positive</text>
  <circle cx="984" cy="188" r="4" fill="#F59E0B"/>
  <text class="tm-legend" x="994" y="192">8% Mixed</text>
</svg>
