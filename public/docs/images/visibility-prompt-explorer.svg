<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 680" role="img" aria-label="Prompt Explorer table showing prompt questions, topic tags, Traffic indicator, and responding LLM badges">
  <defs>
    <filter id="pe-shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="2" stdDeviation="6" flood-color="#0F172A" flood-opacity="0.06"/>
    </filter>
    <style>
      .pe-bg { fill: #FFFFFF; stroke: #E5E7EB; stroke-width: 1; }
      .pe-title { font: 600 15px "Geist", "Inter", system-ui, sans-serif; fill: #0A0A0A; }
      .pe-sub { font: 400 12px "Geist", "Inter", system-ui, sans-serif; fill: #64748B; }
      .pe-col { font: 500 12px "Geist", "Inter", system-ui, sans-serif; fill: #475569; letter-spacing: 0.3px; }
      .pe-prompt { font: 500 13px "Geist", "Inter", system-ui, sans-serif; fill: #0A0A0A; }
      .pe-tag { font: 500 11px "Geist", "Inter", system-ui, sans-serif; }
      .pe-traffic { font: 500 13px "Geist", "Inter", system-ui, sans-serif; fill: #475569; }
      .pe-llm { font: 500 12px "Geist", "Inter", system-ui, sans-serif; fill: #0A0A0A; }
      .pe-llm-more { font: 500 12px "Geist", "Inter", system-ui, sans-serif; fill: #1D4ED8; }
      .pe-divider { stroke: #EEF2F7; stroke-width: 1; }
      .pe-search { fill: #F8FAFC; stroke: #E5E7EB; stroke-width: 1; }
      .pe-search-tx { font: 400 12px "Geist", "Inter", system-ui, sans-serif; fill: #94A3B8; }
      .pe-filter-bg { fill: #FFFFFF; stroke: #E5E7EB; stroke-width: 1; }
      .pe-filter-tx { font: 500 12px "Geist", "Inter", system-ui, sans-serif; fill: #475569; }
    </style>
  </defs>

  <!-- Card -->
