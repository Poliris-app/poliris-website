  <circle cx="776" cy="30" r="5" fill="none" stroke="#94A3B8" stroke-width="1.4"/>
  <line x1="780" y1="34" x2="784" y2="38" stroke="#94A3B8" stroke-width="1.4" stroke-linecap="round"/>
  <text class="pe-search-tx" x="790" y="34">Search&hellip;</text>

  <!-- Filter button -->
