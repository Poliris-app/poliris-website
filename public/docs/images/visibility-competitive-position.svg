<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 560 500" role="img" aria-label="Competitive Position card showing #5 rank and Availability leaderboard">
  <defs>
    <filter id="cp-shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="2" stdDeviation="6" flood-color="#0F172A" flood-opacity="0.06"/>
    </filter>
    <style>
      .cp-bg { fill: #FFFFFF; stroke: #E5E7EB; stroke-width: 1; }
      .cp-title { font: 600 16px "Geist", "Inter", system-ui, sans-serif; fill: #0A0A0A; }
      .cp-sub { font: 400 12px "Geist", "Inter", system-ui, sans-serif; fill: #94A3B8; }
      .cp-weak-bg { fill: #FEE2E2; }
      .cp-weak-tx { font: 500 11px "Geist", "Inter", system-ui, sans-serif; fill: #B91C1C; }
      .cp-rank { font: 800 44px "Geist", "Inter", system-ui, sans-serif; fill: #0A0A0A; }
      .cp-axis-label { font: 500 12px "Geist", "Inter", system-ui, sans-serif; fill: #475569; }
      .cp-axis-label-active { font: 600 12px "Geist", "Inter", system-ui, sans-serif; fill: #0A0A0A; }
      .cp-section-hd { font: 600 14px "Geist", "Inter", system-ui, sans-serif; fill: #0A0A0A; }
      .cp-row-name { font: 500 14px "Geist", "Inter", system-ui, sans-serif; fill: #0A0A0A; }
      .cp-row-rank { font: 500 12px "Geist", "Inter", system-ui, sans-serif; fill: #94A3B8; }
      .cp-strong-bg { fill: #DBEAFE; }
      .cp-strong-tx { font: 500 11px "Geist", "Inter", system-ui, sans-serif; fill: #1D4ED8; }
      .cp-you-bg { fill: #DBEAFE; }
      .cp-you-tx { font: 500 11px "Geist", "Inter", system-ui, sans-serif; fill: #1D4ED8; }
      .cp-divider { stroke: #EEF2F7; stroke-width: 1; }
      .cp-arrow-btn { fill: #FFFFFF; stroke: #E5E7EB; stroke-width: 1; }
      .cp-arrow { stroke: #64748B; stroke-width: 1.5; fill: none; stroke-linecap: round; stroke-linejoin: round; }
    </style>
  </defs>

  <!-- Card -->
  <rect class="cp-bg" x="1" y="1" width="558" height="498" rx="14" ry="14" filter="url(#cp-shadow)"/>

  <!-- Header -->
  <text class="cp-title" x="24" y="34">Competitive Position</text>
  <rect class="cp-weak-bg" x="490" y="19" width="46" height="20" rx="10" ry="10"/>
  <text class="cp-weak-tx" x="513" y="33" text-anchor="middle">Weak</text>

  <!-- #5 rank + trend note -->
  <text class="cp-rank" x="24" y="94">#5</text>
  <text class="cp-sub" x="536" y="86" text-anchor="end">Not enough runs for trend</text>

  <!-- Axis chip columns -->
  <!-- Availability (selected with underline) -->
  <text class="cp-axis-label-active" x="24" y="142">Availability</text>
  <rect class="cp-weak-bg" x="24" y="152" width="46" height="20" rx="10" ry="10"/>
  <text class="cp-weak-tx" x="47" y="166" text-anchor="middle">Weak</text>
  <line x1="24" y1="180" x2="110" y2="180" stroke="#0062FF" stroke-width="2"/>

  <!-- Brand awareness -->
  <text class="cp-axis-label" x="156" y="142">Brand awareness</text>
  <rect class="cp-weak-bg" x="156" y="152" width="46" height="20" rx="10" ry="10"/>
  <text class="cp-weak-tx" x="179" y="166" text-anchor="middle">Weak</text>

  <!-- Design -->
  <text class="cp-axis-label" x="300" y="142">Design</text>
  <rect class="cp-weak-bg" x="300" y="152" width="46" height="20" rx="10" ry="10"/>
  <text class="cp-weak-tx" x="323" y="166" text-anchor="middle">Weak</text>

  <!-- Quality -->
  <text class="cp-axis-label" x="388" y="142">Quality</text>
  <rect class="cp-weak-bg" x="388" y="152" width="46" height="20" rx="10" ry="10"/>
  <text class="cp-weak-tx" x="411" y="166" text-anchor="middle">Weak</text>

  <!-- Divider -->
  <line class="cp-divider" x1="24" y1="204" x2="536" y2="204"/>

  <!-- Availability section header + pagination -->
  <text class="cp-section-hd" x="24" y="232">Availability</text>

  <!-- pagination dots -->
  <circle cx="340" cy="228" r="4" fill="#0062FF"/>
  <circle cx="356" cy="228" r="4" fill="#E2E8F0"/>
  <circle cx="372" cy="228" r="4" fill="#E2E8F0"/>
  <circle cx="388" cy="228" r="4" fill="#E2E8F0"/>

  <!-- prev/next buttons -->
  <rect class="cp-arrow-btn" x="464" y="214" width="28" height="28" rx="8" ry="8"/>
  <polyline class="cp-arrow" points="481,222 474,228 481,234"/>
  <rect class="cp-arrow-btn" x="500" y="214" width="28" height="28" rx="8" ry="8"/>
  <polyline class="cp-arrow" points="511,222 518,228 511,234"/>

  <!-- Competitor rows -->
  <!-- Row 1: ASICS #1 Strong -->
  <g transform="translate(24 272)">
    <rect width="28" height="28" rx="14" ry="14" fill="#EFF6FF"/>
    <text font="600 9px 'Geist', system-ui" x="14" y="18" text-anchor="middle" fill="#1D4ED8" font-size="9" font-weight="600">ASICS</text>
  </g>
  <text class="cp-row-name" x="68" y="290">ASICS</text>
  <text class="cp-row-rank" x="126" y="290">#1</text>
  <rect class="cp-strong-bg" x="480" y="278" width="52" height="20" rx="10" ry="10"/>
  <text class="cp-strong-tx" x="506" y="292" text-anchor="middle">Strong</text>

  <!-- Row 2: Adidas #2 -->
  <g transform="translate(24 318)">
    <rect width="28" height="28" rx="6" ry="6" fill="#0A0A0A"/>
    <!-- Three stripes -->
    <polygon points="7,22 12,7 15,7 10,22" fill="#FFFFFF"/>
    <polygon points="12,22 17,7 20,7 15,22" fill="#FFFFFF"/>
    <polygon points="17,22 22,7 25,7 20,22" fill="#FFFFFF"/>
  </g>
  <text class="cp-row-name" x="68" y="336">Adidas</text>
  <text class="cp-row-rank" x="127" y="336">#2</text>

  <!-- Row 3: New Balance #3 -->
  <g transform="translate(24 364)">
    <rect width="28" height="28" rx="6" ry="6" fill="#E11D48"/>
    <text x="14" y="20" text-anchor="middle" fill="#FFFFFF" font-size="14" font-weight="700" font-family="'Geist', system-ui, sans-serif">N</text>
  </g>
  <text class="cp-row-name" x="68" y="382">New Balance</text>
  <text class="cp-row-rank" x="164" y="382">#3</text>

  <!-- Row 4: Onitsuka Tiger #5 (You) -->
  <g transform="translate(24 410)">
    <rect width="28" height="28" rx="6" ry="6" fill="#1E293B"/>
    <path d="M4 18 L14 6 L24 18 Z" fill="#F59E0B"/>
  </g>
  <text class="cp-row-name" x="68" y="428">Onitsuka Tiger</text>
  <text class="cp-row-rank" x="180" y="428">#5</text>
  <rect class="cp-you-bg" x="494" y="418" width="38" height="20" rx="10" ry="10"/>
  <text class="cp-you-tx" x="513" y="432" text-anchor="middle">You</text>
</svg>
