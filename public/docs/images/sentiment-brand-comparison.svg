      .bc-strong-bg { fill: #DCFCE7; }
      .bc-strong-tx { font: 500 12px "Geist", "Inter", system-ui, sans-serif; fill: #15803D; }
      .bc-you-bg { fill: #DBEAFE; }
      .bc-you-tx { font: 500 10px "Geist", "Inter", system-ui, sans-serif; fill: #1D4ED8; }
