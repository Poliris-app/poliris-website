<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 460" role="img" aria-label="Brand Comparison Table with 7 brands rated Strong across Avg., Qualite, Brand Awareness, Design, and Availability axes.">
  <defs>
    <filter id="bc-shadow" x="-10%" y="-10%" width="120%" height="120%">
